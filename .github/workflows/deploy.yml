name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# GitHub Actions Node 20 runtime deprecation'ı için: action'ları Node 24'e zorla.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # npm install (npm ci yerine): platforma özgü opsiyonel bağımlılıkların
      # (ör. @emnapi/*) Linux runner'da sorunsuz çözülmesi için.
      - run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          # Supabase ortam değişkenleri (repo Secrets'tan gelir).
          # Tanımlı değilse uygulama YEREL modda derlenir.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
