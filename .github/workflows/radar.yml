name: Maison Radar (daily)

on:
  schedule:
    - cron: "0 4 * * *" # her gün 04:00 UTC = 07:00 TR
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# GitHub Actions Node 20 runtime deprecation'ı için: action'ları Node 24'e zorla.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Maison Radar haberlerini güncelle
        run: node scripts/fetch-radar.mjs

      - name: Değişiklik varsa commit'le
        run: |
          if ! git diff --quiet -- public/radar.json; then
            git config user.name "tofta-radar-bot"
            git config user.email "actions@users.noreply.github.com"
            git add public/radar.json
            git commit -m "chore(radar): günlük haber güncellemesi [skip ci]"
            git push
          else
            echo "Değişiklik yok."
          fi

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
