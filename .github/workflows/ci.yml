name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      # npm install (npm ci yerine): Linux runner'da opsiyonel @emnapi/* uyumu için deploy.yml ile aynı.
      - run: npm install --no-audit --no-fund
      - run: npm run test
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
        env:
          CI: "true"
          VITE_BASE: /
          VITE_SUPABASE_URL: ""
          VITE_SUPABASE_ANON_KEY: ""
